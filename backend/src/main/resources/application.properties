spring.application.name=RepoPilot AI Backend
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://127.0.0.1:5433/repolens_ai}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

app.jwt.secret=${JWT_SECRET:change-this-dev-secret-for-repopilot-ai-minimum-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.github.token=${GITHUB_TOKEN:}

# Spring AI - Ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.model.chat=ollama
spring.ai.ollama.chat.options.model=${AI_CHAT_MODEL:qwen2.5-coder:7b}
spring.ai.ollama.chat.options.temperature=${AI_CHAT_TEMPERATURE:0.2}
spring.ai.model.embedding=ollama
spring.ai.ollama.embedding.options.model=${AI_EMBEDDING_MODEL:nomic-embed-text}

# RepoPilot AI flags
app.ai.enabled=${AI_ENABLED:true}
app.ai.provider=${AI_PROVIDER:ollama}
app.ai.chat-model=${AI_CHAT_MODEL:qwen2.5-coder:7b}
app.ai.embedding-model=${AI_EMBEDDING_MODEL:nomic-embed-text}

# RepoPilot AI RAG / PGVector
app.ai.embedding-dimensions=${AI_EMBEDDING_DIMENSIONS:768}
app.ai.rag.enabled=${AI_RAG_ENABLED:true}
app.ai.rag.chunk-size=${AI_RAG_CHUNK_SIZE:1800}
app.ai.rag.chunk-overlap=${AI_RAG_CHUNK_OVERLAP:200}
app.ai.rag.max-chunks-per-file=${AI_RAG_MAX_CHUNKS_PER_FILE:20}
app.ai.rag.embedding-batch-size=${AI_RAG_EMBEDDING_BATCH_SIZE:16}
app.ai.rag.search-limit=${AI_RAG_SEARCH_LIMIT:5}

# RepoPilot AI chat memory
app.ai.memory.max-messages=${AI_MEMORY_MAX_MESSAGES:6}
app.ai.memory.max-answer-chars=${AI_MEMORY_MAX_ANSWER_CHARS:600}

# RepoPilot AI security and safety
app.ai.security.timeout-seconds=${AI_TIMEOUT_SECONDS:45}
app.ai.security.rate-limit-per-minute=${AI_RATE_LIMIT_PER_MINUTE:12}
app.ai.security.audit-enabled=${AI_AUDIT_ENABLED:true}

# RepoPilot AI MCP integration
app.ai.mcp.enabled=${AI_MCP_ENABLED:false}
app.ai.mcp.server-name=${AI_MCP_SERVER_NAME:local-repopilot-context}
app.ai.mcp.endpoint=${AI_MCP_ENDPOINT:}
app.ai.mcp.context=${AI_MCP_CONTEXT:}

# RepoPilot AI multimodal support
app.ai.multimodal.enabled=${AI_MULTIMODAL_ENABLED:true}
app.ai.multimodal.model=${AI_MULTIMODAL_MODEL:llava}
