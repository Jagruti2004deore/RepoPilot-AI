spring.application.name=RepoLensAI Backend
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://127.0.0.1:5433/repolens_ai}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

app.jwt.secret=${JWT_SECRET:change-this-dev-secret-for-repolens-ai-minimum-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.github.token=${GITHUB_TOKEN:}
